<p-dialog
  [header]="header()"
  [visible]="visible()"
  [modal]="true"
  [style]="{ width: '500px' }"
  [dismissableMask]="true"
  (visibleChange)="close()">

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div style="display:flex; flex-direction:column; gap:1rem; padding: 0.5rem 0;">

      <!-- Nombre -->
      <div style="display:flex; flex-direction:column; gap:4px;">
        <label style="font-size:0.875rem; font-weight:600; color:#555;">
          Nombre <span style="color:red;">*</span>
        </label>
        <input pInputText formControlName="nombre" style="width:100%;" placeholder="Ej: Juan Pérez" />
        <small style="color:red; font-size:0.75rem;">{{ getError('nombre') }}</small>
      </div>

      <!-- Email -->
      <div style="display:flex; flex-direction:column; gap:4px;">
        <label style="font-size:0.875rem; font-weight:600; color:#555;">Email</label>
        <input pInputText formControlName="email" style="width:100%;" placeholder="correo@ejemplo.com" />
        <small style="color:red; font-size:0.75rem;">{{ getError('email') }}</small>
      </div>

      <!-- Teléfono y Fecha -->
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
        <div style="display:flex; flex-direction:column; gap:4px;">
          <label style="font-size:0.875rem; font-weight:600; color:#555;">Teléfono</label>
          <input pInputText formControlName="telefono" style="width:100%;" placeholder="300-000-0000" />
        </div>
        <div style="display:flex; flex-direction:column; gap:4px;">
          <label style="font-size:0.875rem; font-weight:600; color:#555;">Fecha de nacimiento</label>
          <p-calendar formControlName="fecha_nacimiento" [showIcon]="true"
            dateFormat="dd/mm/yy" styleClass="w-full" placeholder="dd/mm/aaaa" />
        </div>
      </div>

      <!-- Entidad -->
      <div style="display:flex; flex-direction:column; gap:4px;">
        <label style="font-size:0.875rem; font-weight:600; color:#555;">Entidad</label>
        <p-dropdown formControlName="entidad_id" [options]="entidades()"
          placeholder="Selecciona una entidad" styleClass="w-full" />
      </div>

      <!-- Dirección -->
      <div style="display:flex; flex-direction:column; gap:4px;">
        <label style="font-size:0.875rem; font-weight:600; color:#555;">Dirección</label>
        <input pInputText formControlName="direccion" style="width:100%;" placeholder="Calle, ciudad..." />
      </div>

      <!-- Notas -->
      <div style="display:flex; flex-direction:column; gap:4px;">
        <label style="font-size:0.875rem; font-weight:600; color:#555;">Notas</label>
        <textarea pInputTextarea formControlName="notas" style="width:100%;" rows="3"
          placeholder="Observaciones adicionales..."></textarea>
      </div>

      <!-- Footer -->
      <div style="display:flex; justify-content:flex-end; gap:0.5rem; padding-top:1rem; border-top:1px solid #e9ecef;">
        <p-button label="Cancelar" severity="secondary" [outlined]="true" (onClick)="close()" />
        <p-button [label]="buttonLabel()" type="submit" severity="success" icon="pi pi-check" />
      </div>

    </div>
  </form>

</p-dialog>
