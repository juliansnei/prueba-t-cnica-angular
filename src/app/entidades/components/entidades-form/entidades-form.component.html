<p-dialog [header]="buttonLabel()" [visible]="visible()" 
 (visibleChange)="onVisibleChange($event)" [style]="{ width: '25rem' }" 
 [modal]="true"
  [dismissableMask]="true">
    <form [formGroup]="entidadesForm" (ngSubmit)="onSubmit()">
        
        <div class="flex align-items-center gap-3 mb-3">
            <label for="username" class="font-semibold w-6rem">Nombre</label>
            <div class="flex flex-column flex-auto">
            <input formControlName="nombre" pInputText id="username" class="flex-auto" autocomplete="off" />
            <small class="p-error">{{ getError('nombre') }}</small>

            </div>
        </div>
        <div class="flex align-items-center gap-3 mb-5">
            <label for="email" class="font-semibold w-6rem">Nit</label>
            <div class="flex flex-column flex-auto">
               <input formControlName="nit" pInputText id="email" class="flex-auto" autocomplete="off" />
                    <small class="p-error">{{ getError('nit') }}</small>
            </div>
        </div>
        <div class="flex align-items-center gap-3 mb-3">
            <label for="telefono" class="font-semibold w-6rem">Telefono</label>
            <div class="flex flex-column flex-auto">
                 <input formControlName="telefono" pInputText id="telefono" class="flex-auto" autocomplete="off" />
            <small class="p-error">{{ getError('telefono') }}</small>
            </div>
           

            
        </div>
        <div class="flex align-items-center gap-3 mb-3">
            <label for="direccion" class="font-semibold w-6rem">Dirección</label>
            <div class="flex flex-column flex-auto">
            <input formControlName="direccion" pInputText id="direccion" class="flex-auto" autocomplete="off" />
            <small class="p-error">{{ getError('direccion') }}</small>
            </div>
           

        </div>
        <div class="flex justify-content-end gap-2">
            <p-button [label]="buttonLabel()" type="submit"/>
        </div>
    </form>
</p-dialog>
